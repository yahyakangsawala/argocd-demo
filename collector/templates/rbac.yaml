
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traces-writer-{{ .Values.tempo.tenantName}}
  labels:
    {{- include "collector.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traces-writer-{{ .Values.tempo.tenantName}}
subjects:
  - kind: ServiceAccount
    name: collector-collector
    namespace: {{ .Values.namespace }}
---
# RBAC needs the cluster role to be created during Tempo installation
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8sattributes-collector-{{ .Values.tempo.tenantName}}
  labels:
    {{- include "collector.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8sattributes-otel-collector-istio-tempo
subjects:
  - kind: ServiceAccount
    name: collector-collector
    namespace: {{ .Values.namespace }}