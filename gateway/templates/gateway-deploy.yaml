apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  selector:
    matchLabels:
      istio: {{ .Values.gateway.name }}
  template:      
    metadata:
      annotations:
        # Select the gateway injection template (rather than the default sidecar template)
        inject.istio.io/templates: gateway
      labels:
        # Set a unique label for the gateway. This is required to ensure Gateways can select this workload
        istio: {{ .Values.gateway.name }}
        # Enable gateway injection. If connecting to a revisioned control plane, replace with "istio.io/rev: revision-name"
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: istio-proxy
           #image: auto # The image will automatically update each time the pod starts.
          # image: registry-quay-quay-enterprise.apps.nphubc01.corp.bbynuat.com/devspaces/istio-proxy2:1.26.4-1757524855
          image: registry.redhat.io/openshift-service-mesh/istio-proxyv2-rhel9:1.26.4-1757524855
          imagePullPolicy: Always
          resources:
            limits:
              cpu: {{ .Values.gateway.resources.limits.cpu }}
              memory: {{ .Values.gateway.resources.limits.memory }}
            requests:
              cpu: {{ .Values.gateway.resources.requests.cpu }}
              memory: {{ .Values.gateway.resources.requests.memory }}     
      serviceAccountName: {{ .Values.gateway.name }}