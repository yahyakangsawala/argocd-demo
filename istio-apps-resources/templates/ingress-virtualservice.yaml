{{- if eq .Values.gateway.type "ingress"  -}}
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ .Values.service.name }}-virtual-service
  namespace: {{ .Values.service.namespace }}
spec:
  hosts:
  - {{ .Values.gateway.host | quote }}
  gateways:
  - {{ .Values.gateway.namespace }}/{{ .Values.gateway.name }}-gateway
  http:
  - match:
    - uri:
        exact: /productpage
    - uri:
        prefix: /static
    - uri:
        exact: /login
    - uri:
        exact: /logout
    - uri:
        prefix: /api/v1/products
    route:
    - destination:
        host: {{ .Values.service.name }}.{{ .Values.service.namespace }}.svc.cluster.local
        port:
          number: 9080
{{- end }}          