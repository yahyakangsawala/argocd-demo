# Applies to pods labeled as the user-collector (OpenTelemetry collector) in the istio instance namespace.
# Globally enforces STRICT mTLS for these pods except on port 4317.
# On port 4317, it switches to PERMISSIVE mode, which means:
# Both mTLS and plaintext (non-mTLS) traffic are accepted on that port
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: collector
  namespace: {{ .Values.namespace }}
spec:
  mtls:
    mode: STRICT
  portLevelMtls:
    {{ .Values.collector.port }}:
      mode: PERMISSIVE
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: opentelemetry-operator
      app.kubernetes.io/name: collector