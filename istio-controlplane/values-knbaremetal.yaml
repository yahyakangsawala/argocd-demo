# Values to replace patch-me-see-overlays
namespace: istio-system   # Kubernetes namespace where Istio controlplane components  will be deployed

istio:
  # meshName, each mesh instane requiires a dedicated meshName
  meshName: istio-knbaremetal      # Unique identifier for the Istio service mesh
  replicas: 2                   # Number of Istio replicas (pods) to run
  resources:
    limits:
      cpu: 500m                 # Maximum CPU that each Istio pod can use
      memory: 128Mi             # Maximum memory that each Istio pod can use
    requests:
      cpu: 5m                   # Minimum guaranteed CPU for each Istio pod
      memory: 64Mi              # Minimum guaranteed memory for each Istio pod
  logging:
    level: "http:info,http2:info,router:info"   # Logging levels for Istio components

# Opentelemetry collector port
collector:
  port: 4317   # gRPC port for OpenTelemetry collector (receives traces)

