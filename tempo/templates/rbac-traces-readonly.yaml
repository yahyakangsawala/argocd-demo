# Read only role to allow all authenticated User (Openshift Console) to view traces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tempostack-traces-reader-{{ .Values.namespace }}
rules:
  - apiGroups:
      - 'tempo.grafana.com'
    resources:
      {{- range .Values.tenants }}
      - {{ .name }}
      {{- end }}
    resourceNames:
      - traces
    verbs:
      - 'get'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tempostack-traces-reader-{{ .Values.namespace }}
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tempostack-traces-reader-{{ .Values.namespace }}
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: system:authenticated